<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body style="font-family: Arial; background-color: #f4f4f4; padding: 20px;">

<div style="max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px;">

    <h2 style="color: #333;">🎬 Cinema Booking Confirmation</h2>

    <p>Hello <b th:text="${username}">User</b>,</p>

    <p>You have requested a booking for the following seats:</p>

    <ul>
        <li th:each="seat : ${seats}"
            th:text="'Row ' + ${seat.rowNumber} + ', Seat ' + ${seat.seatNumber}">
            Seat info
        </li>
    </ul>

    <p><b>Showtime:</b> <span th:text="${showtime}">time</span></p>

    <br>

    <a th:href="${confirmUrl}"
       style="display:inline-block; padding:10px 20px; background-color:#28a745; color:white; text-decoration:none; border-radius:5px;">
        Confirm Booking
    </a>

    <p style="margin-top:20px; font-size:12px; color:gray;">
        If you did not request this, please ignore this email.
    </p>

</div>

</body>
</html>
